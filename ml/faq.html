          "This matters because some functions expect 2D input. Use :1 to preserve dimensions.\n\n" +
          "MORE EXAMPLES:\n" +
          "\u2022 data[0, :] \u2192 [10, 20, 30] \u2014 row 0, all columns (same as data[0])\n" +
          "\u2022 data[:, -1] \u2192 [30, 60, 90, 120, 150] \u2014 all rows, last column\n" +
          "\u2022 data[:, 0:2] \u2192 all rows, columns 0 and 1 (first two columns)\n" +
          "\u2022 data[::2] \u2192 every 2nd row \u2192 rows 0, 2, 4\n" +
          "\u2022 data[::-1] \u2192 all rows reversed (bottom to top)\n" +
          "\u2022 data[1:4, 0:2] \u2192 rows 1-3, columns 0-1 (a rectangular sub-block)\n\n" +
          "3D EXAMPLE (images):\n" +
          "img has shape (224, 224, 3) \u2014 height, width, RGB channels\n" +
          "\u2022 img[:, :, 0] \u2192 shape (224, 224) \u2014 just the Red channel\n" +
          "\u2022 img[:, :, :1] \u2192 shape (224, 224, 1) \u2014 Red channel, kept as 3D\n" +
          "\u2022 img[100:200, 50:150, :] \u2192 a 100\u00D7100 crop from the middle, all channels\n" +
          "\u2022 img[0, 0, :] \u2192 [R, G, B] values of the top-left pixel\n\n" +
          "4D EXAMPLE (batch of images):\n" +
          "batch has shape (32, 3, 224, 224) \u2014 32 images in PyTorch format\n" +
          "\u2022 batch[0] \u2192 shape (3, 224, 224) \u2014 first image\n" +
          "\u2022 batch[:, 0, :, :] \u2192 shape (32, 224, 224) \u2014 Red channel of ALL images\n" +
          "\u2022 batch[0:8] \u2192 shape (8, 3, 224, 224) \u2014 first 8 images\n\n" +
          "BOOLEAN INDEXING (filtering):\n" +
          "\u2022 data[data > 50] \u2192 [60, 70, 80, 90, 100, 110, 120, 130, 140, 150] \u2014 all values > 50, flattened\n" +
          "\u2022 labels == 1 creates a boolean mask, then data[labels == 1] selects only rows where label is 1\n\n" +
          "COMMON GOTCHA \u2014 ... (ellipsis):\n" +
          "\u2022 data[..., 0] means 'all other dimensions, then index 0 on the last axis'\n" +
          "\u2022 Useful when you don\u2019t know how many dimensions there are. batch[..., :100, :100] crops all images to 100\u00D7100 regardless of batch/channel dimensions."
      },
      {
        id: 20,
        category: "debugging",
        question: "How does debugging in ML engineering differ from normal backend/software engineering debugging?",
        answer: "The core instinct is the same \u2014 inspect state, narrow down where it breaks, fix the root cause. But the tools and what you look for are completely different.\n\n" +
          "IN BACKEND ENGINEERING:\n" +
          "You debug control flow and data correctness. Did this function get called? Did this value come through as expected? Is this object null? Your tools: breakpoints in an IDE, console.log/print, stack traces, logging with severity levels. The data you inspect is usually small \u2014 a string, an integer, a JSON object. You can read it in full.\n\n" +
          "IN ML ENGINEERING:\n" +
          "You debug shape, dtype, value range, and distribution. The data is never small. A single tensor might have 50,000 rows and 2,048 columns. You cannot and would never want to read it in full. What you care about is its statistical and structural properties.\n\n" +
          "The equivalent of a breakpoint in ML is this pattern:\n\n" +
          "  arr = np.load('file.npy')\n" +
          "  print(arr.shape)              # (351, 2051) \u2014 is this what I expected?\n" +
          "  print(arr.dtype)              # float64 \u2014 should this be float32?\n" +
          "  print(arr.min(), arr.max())   # any extreme values? any inf or nan?\n" +
          "  print(np.isnan(arr).any())    # False \u2014 good, no corrupted values\n\n" +
          "That four-line block tells you more about what is in that array than reading a thousand individual values would.\n\n" +
          "WHAT TO CHECK AT EACH LAYER:\n\n" +
          "When loading data:\n" +
          "\u2022 shape \u2014 is it (n_tiles, 2048) or something unexpected?\n" +
          "\u2022 peek at first few rows \u2014 arr[:3] \u2014 are values reasonable?\n" +
          "\u2022 mean of features \u2014 are they centred around 0 or wildly off?\n\n" +
          "After preprocessing (Dataset.__getitem__):\n" +
          "\u2022 features.shape \u2014 did stripping/transform work?\n" +
          "\u2022 features.dtype \u2014 expect torch.float32, not float64\n" +
          "\u2022 label value and dtype \u2014 expect tensor(0.) or tensor(1.) as float32\n\n" +
          "Inside model forward pass (where most ML bugs hide):\n" +
          "\u2022 print input shape at entry \u2014 (n_tiles, 2048)\n" +
          "\u2022 print shape after each operation \u2014 find where it diverges from expected\n" +
          "\u2022 print value ranges of intermediate scores \u2014 any inf or nan?\n" +
          "\u2022 print final output \u2014 should be a single number, not a vector\n\n" +
          "During training (watching the loss):\n" +
          "\u2022 loss.item() each step \u2014 should decrease over time\n" +
          "\u2022 if nan \u2192 data problem (log of zero, division by zero, extreme values)\n" +
          "\u2022 if it never moves \u2192 learning rate wrong, or forgot loss.backward()\n" +
          "\u2022 if it explodes to 1000+ \u2192 gradient overflow\n\n" +
          "THE HONEST SUMMARY:\n" +
          "Backend debugging asks: did the right thing happen?\n" +
          "ML debugging asks: does the data have the right shape, type, and statistical properties at every step?\n" +
          "shape, dtype, min/max, isnan, and mean are your breakpoints."
      },
      {
        id: 21,
        category: "debugging",
        question: "What are the most common ML bugs and how do you spot and fix them?",
        answer: "THE MOST COMMON ML BUGS:\n\n" +
          "1. NaN in the loss\n" +
          "Symptom: loss prints as nan, model produces garbage.\n" +
          "Cause: log of zero, division by zero, or extreme feature values somewhere in the pipeline.\n" +
          "Fix: add print(torch.isnan(features).any()) before the forward pass to isolate which sample is causing it. Use torch.autograd.set_detect_anomaly(True) at the top of your script \u2014 PyTorch will throw a detailed error at the exact operation that produced the NaN, instead of letting it silently propagate.\n\n" +
          "2. Wrong shape entering a layer\n" +
          "Symptom: RuntimeError: mat1 and mat2 shapes cannot be multiplied.\n" +
          "Cause: a tensor arrived at a linear layer with wrong dimensions. The most common crash in ML.\n" +
          "Fix: add shape prints before and after every operation until you find where the shape diverged from expected. Then trace back to the transform or operation that broke it.\n\n" +
          "3. Loss not moving (model not learning)\n" +
          "Symptom: loss stays at the same value epoch after epoch.\n" +
          "Causes (check in this order):\n" +
          "\u2022 Forgot loss.backward() \u2014 gradients never computed\n" +
          "\u2022 Forgot optimizer.step() \u2014 weights never updated\n" +
          "\u2022 Model is in eval() mode during training \u2014 dropout/batchnorm disabled\n" +
          "\u2022 Learning rate too small \u2014 steps are negligible\n" +
          "\u2022 Labels are all the same class \u2014 data loading bug\n\n" +
          "4. Predictions are all the same value\n" +
          "Symptom: every input gets prediction of 0.5 (or some constant).\n" +
          "Cause: model collapsed \u2014 never learned anything meaningful. Often caused by a data bug where all labels look the same from the model\u2019s perspective, or the model architecture bottleneck is too narrow.\n\n" +
          "5. Training loss is great but test performance is terrible\n" +
          "Symptom: 99% train accuracy, 55% test accuracy.\n" +
          "Cause: overfitting or data leakage. The model memorized the training data.\n" +
          "Fix: add regularization (dropout, weight decay), reduce model size, get more data, or check for data leakage (future information leaking into training set).\n\n" +
          "ML-SPECIFIC DEBUGGING TOOLS:\n\n" +
          "\u2022 torch.autograd.set_detect_anomaly(True) \u2014 stops at the exact operation that produces NaN. Insert once at top of script. Essential.\n\n" +
          "\u2022 Tensor assertions as inline guards:\n" +
          "  assert features.shape[1] == 2048, f'Expected 2048, got {features.shape[1]}'\n" +
          "  assert not torch.isnan(features).any(), 'NaN in features'\n" +
          "  assert label.dtype == torch.float32, f'Wrong dtype: {label.dtype}'\n" +
          "These turn debug prints into permanent safety checks that catch regressions.\n\n" +
          "\u2022 Loss curve logging \u2014 instead of printing every loss value, collect them and plot. A loss that decreases smoothly is healthy. Oscillating = learning rate too high. Plateau = learning rate too low or model capacity maxed. Explosion = gradient overflow. In production use Weights & Biases or MLflow. In a test/assessment, saving to a list and printing a summary per epoch works.\n\n" +
          "\u2022 Gradient checking \u2014 after loss.backward(), check if gradients exist:\n" +
          "  for name, p in model.named_parameters():\n" +
          "      if p.grad is None: print(f'No gradient for {name}')\n" +
          "  This catches disconnected layers that aren\u2019t learning."
      }
    ];

    function ChevronIcon(props) {
      var open = props.open;
      return e("svg", {
        width: 20, height: 20, viewBox: "0 0 20 20", fill: "none",
        style: {transition: "transform 0.3s ease", transform: open ? "rotate(180deg)" : "rotate(0deg)", flexShrink: 0}
      },
        e("path", {d: "M5 7.5L10 12.5L15 7.5", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round"})
      );
    }

    function FAQItem(props) {
      var item = props.item, isOpen = props.isOpen, onToggle = props.onToggle;
      var cat = CATEGORIES[item.category];

      return e("div", {
        style: {
          marginBottom: 8,
          borderRadius: 12,
          border: isOpen ? "1.5px solid " + cat.color : "1px solid #e5e5e5",
          background: isOpen ? cat.bg + "44" : "#fff",
          overflow: "hidden",
          transition: "all 0.2s ease"
        }
      },
        e("button", {
          onClick: onToggle,
          style: {
            width: "100%", display: "flex", alignItems: "flex-start", gap: 12,
            padding: "16px 20px", background: "transparent", border: "none",
            cursor: "pointer", textAlign: "left", color: "#1a1a2e"
          }
        },
          e("span", {
            style: {
              fontSize: 10, fontWeight: 600, color: cat.color, background: cat.bg,
              padding: "3px 8px", borderRadius: 6, whiteSpace: "nowrap", marginTop: 2
            }
          }, cat.label.split(" ")[0]),
          e("span", {style: {flex: 1, fontSize: 15, fontWeight: 500, lineHeight: 1.4}}, item.question),
          e(ChevronIcon, {open: isOpen})
        ),
        isOpen ? e("div", {
          style: {
            padding: "0 20px 20px 20px",
            animation: "fadeSlideIn 0.3s ease"
          }
        },
          e("div", {
            style: {
              background: "#fff", borderRadius: 10, padding: "16px 20px",
              border: "1px solid " + cat.color + "33",
              fontSize: 14, lineHeight: 1.75, color: "#333",
              whiteSpace: "pre-line"
            }
          }, item.answer)
        ) : null
      );
    }

    function FAQApp() {
      var _open = useState(null), openId = _open[0], setOpenId = _open[1];
      var _search = useState(""), search = _search[0], setSearch = _search[1];
      var _cat = useState("all"), catFilter = _cat[0], setCatFilter = _cat[1];

      var filtered = useMemo(function () {
        return FAQ_DATA.filter(function (item) {
          if (catFilter !== "all" && item.category !== catFilter) return false;
          if (search) {
            var s = search.toLowerCase();
            return item.question.toLowerCase().includes(s) || item.answer.toLowerCase().includes(s);
          }
          return true;
        });
      }, [search, catFilter]);

      var counts = useMemo(function () {
        var c = {all: FAQ_DATA.length};
        Object.keys(CATEGORIES).forEach(function (k) {
          c[k] = FAQ_DATA.filter(function (d) { return d.category === k; }).length;
        });
        return c;
      }, []);

      return e("div", {style: {maxWidth: 900, margin: "0 auto", padding: "8px 0"}},
        e("style", null,
          "@keyframes fadeSlideIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }"
        ),

        e("div", {style: {marginBottom: 20}},
          e("h2", {style: {fontSize: 22, fontWeight: 600, margin: "0 0 4px", color: "#1a1a2e"}}, "ML / AI Frequently Asked Questions"),
          e("p", {style: {fontSize: 13, color: "#888", margin: "0 0 16px"}},
            FAQ_DATA.length + " questions covering the most common confusions in machine learning \u2014 click any question to reveal the answer"
          ),

          e("input", {
            value: search, onChange: function (ev) { setSearch(ev.target.value); },
            placeholder: "Search questions and answers...",
            style: {
              width: "100%", padding: "10px 14px", borderRadius: 10,
              border: "1px solid #ddd", fontSize: 14, marginBottom: 12,
              background: "#fff", color: "#333"
            }
          }),

          e("div", {style: {display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 8}},
            [["all", "All", "#555", "#f0f0f0"]].concat(
              Object.entries(CATEGORIES).map(function (en) {
                return [en[0], en[1].label, en[1].color, en[1].bg];
              })
            ).map(function (arr) {
              var key = arr[0], label = arr[1], color = arr[2], bg = arr[3];
              var active = catFilter === key;
              return e("button", {
                key: key,
                onClick: function () { setCatFilter(key); },
                style: {
                  padding: "5px 12px", borderRadius: 8, fontSize: 12, fontWeight: 500, cursor: "pointer",
                  border: active ? "none" : "1px solid " + color + "55",
                  background: active ? color : "transparent",
                  color: active ? "#fff" : color,
                  transition: "all 0.2s"
                }
              }, label + " (" + (counts[key] || 0) + ")");
            })
          )
        ),

        filtered.length === 0
          ? e("div", {style: {textAlign: "center", padding: 40, color: "#999", fontSize: 14}}, "No questions match your search.")
          : filtered.map(function (item) {
              return e(FAQItem, {
                key: item.id,
                item: item,
                isOpen: openId === item.id,
                onToggle: function () { setOpenId(openId === item.id ? null : item.id); }
              });
            }),

        e("div", {
          style: {
            marginTop: 24, padding: "16px 20px", background: "#f5f5f0",
            borderRadius: 12, fontSize: 12, lineHeight: 1.7, color: "#666"
          }
        },
          e("span", {style: {fontWeight: 600, color: "#333"}}, "Quick reference: "),
          "An ", e("span", {style: {color: "#0F6E56", fontWeight: 500}}, "architecture"),
          " is the blueprint (Transformer, CNN). An ",
          e("span", {style: {color: "#534AB7", fontWeight: 500}}, "algorithm"),
          " is the procedure (backpropagation, attention). A ",
          e("span", {style: {color: "#185FA5", fontWeight: 500}}, "model"),
          " is the trained product (GPT-4, BERT). Architecture + Algorithm + Data = Model."
        )
      );
    }

    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(FAQApp));
  </script>
</body>
