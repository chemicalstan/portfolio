<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ML Engineer Handbook</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fafafa; color: #1a1a2e; min-height: 100vh; }
    nav { background: #1a1a2e; padding: 12px 24px; display: flex; align-items: center; gap: 24px; }
    nav a { color: #ccc; text-decoration: none; font-size: 14px; transition: color 0.2s; }
    nav a:hover { color: #fff; }
    nav a.active { color: #fff; font-weight: 500; }
    nav .brand { color: #fff; font-weight: 600; font-size: 15px; margin-right: auto; }
    #root { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  </style>
</head>
<body>
  <nav>
    <span class="brand">ML Reference Table</span>
    <a href="./index.html">World Map</a>
    <a href="./faq.html">FAQ</a>
    <a href="./handbook.html" class="active">Handbook</a>
    <a href="./index.html">&larr; Back to Portfolio</a>
  </nav>
  <div id="root"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
  <script>
    var useState = React.useState, useMemo = React.useMemo;
    var e = React.createElement;

    var ROLES = [
      {id:"mle", abbr:"MLE", title:"Machine Learning Engineer", color:"#185FA5", bg:"#E6F1FB",
       oneLiner:"How do we turn this model into a production system that works reliably?",
       thinkOf:"Part software engineer, part applied ML practitioner, part MLOps engineer",
       responsibilities:[
         "Build training and inference pipelines",
         "Prepare data for models in production",
         "Train, evaluate, package, deploy, and monitor models",
         "Optimize for latency, scale, reliability, and cost",
         "Integrate models into real applications with product/backend teams"
       ]},
      {id:"ds", abbr:"DS", title:"Data Scientist", color:"#0F6E56", bg:"#E1F5EE",
       oneLiner:"What should we try, and does it work?",
       thinkOf:"Part analyst, part statistician, part experimental model builder",
       responsibilities:[
         "Understand the business problem",
         "Explore and clean data, form hypotheses",
         "Run experiments and build prototypes",
         "Compare candidate features and models",
         "Interpret results for business stakeholders"
       ]},
      {id:"de", abbr:"DE", title:"Data Engineer", color:"#854F0B", bg:"#FAEEDA",
       oneLiner:"How do we get clean, reliable data to the right place?",
       thinkOf:"The builder of the data plumbing",
       responsibilities:[
         "Build data pipelines (ETL/ELT)",
         "Move data from sources into warehouses/lakes",
         "Ensure data quality, freshness, and reliability",
         "Model data for analytics and ML consumption",
         "Manage workflow orchestration"
       ]},
      {id:"aie", abbr:"AIE", title:"AI Engineer", color:"#993C1D", bg:"#FAECE7",
       oneLiner:"How do we build a real AI product using modern foundation models?",
       thinkOf:"An application engineer for modern AI systems",
       responsibilities:[
         "Integrate LLMs, vision/speech models, agents into products",
         "Build prompt pipelines, RAG systems, evaluation flows",
         "Orchestrate model calls, tools, memory, and UX",
         "Optimize cost, latency, and product behavior",
         "Build guardrails and safety layers"
       ]}
    ];

    var OVERLAPS = [
      {a:"MLE", b:"Data Scientist", color:"#534AB7", items:["Feature engineering","Model selection","Experiment evaluation","Understanding metrics","Error analysis"]},
      {a:"MLE", b:"Data Engineer", color:"#854F0B", items:["Data pipelines","Batch and streaming data","Feature stores","Data validation","Production data quality"]},
      {a:"MLE", b:"AI Engineer", color:"#993C1D", items:["Model serving","Inference optimization","Evaluation","Deployment","Monitoring"]}
    ];

    var PROBLEM_CATEGORIES = [
      {id:"classification", title:"Classification", color:"#185FA5", bg:"#E6F1FB",
       desc:"Output is a category (spam/not spam, fraud/not fraud, disease present/absent)",
       models:"Logistic regression, Decision tree, Random forest, XGBoost/LightGBM/CatBoost, SVM, Neural network, Transformer (text/image)",
       metrics:"Accuracy (balanced classes), Precision (false positives costly), Recall (false negatives costly), F1 (balance both), ROC-AUC / PR-AUC (compare across thresholds)",
       examples:"Spam detection, fraud detection, churn prediction, medical diagnosis"},
      {id:"regression", title:"Regression", color:"#0F6E56", bg:"#E1F5EE",
       desc:"Output is a continuous number (price, demand, revenue, delivery time)",
       models:"Linear/Ridge/Lasso/ElasticNet regression, Decision tree regressor, Random forest regressor, XGBoost regressor, Neural network",
       metrics:"MAE (easy-to-understand average error), RMSE (punishes large errors more), R-squared (variance explained)",
       examples:"House price prediction, demand forecasting, revenue estimation"},
      {id:"ranking", title:"Ranking", color:"#534AB7", bg:"#EEEDFE",
       desc:"Goal is to order items by relevance (search results, feed, recommendations, ads)",
       models:"LambdaMART, XGBoost ranker, LightGBM ranker, RankNet, Neural ranking, Transformer-based rerankers",
       metrics:"NDCG, MAP, MRR, Precision@K, Recall@K",
       examples:"Search results, social feed ranking, product recommendations, ad ordering"},
      {id:"clustering", title:"Clustering", color:"#854F0B", bg:"#FAEEDA",
       desc:"Discover groups without labels (unsupervised). Business interpretability matters as much as math metrics.",
       models:"K-means, Hierarchical clustering, DBSCAN, Gaussian mixture models",
       metrics:"Silhouette score, Davies-Bouldin index, Calinski-Harabasz score, business usefulness",
       examples:"Customer segmentation, behavior grouping, anomaly pattern discovery"},
      {id:"timeseries", title:"Time Series Forecasting", color:"#993C1D", bg:"#FAECE7",
       desc:"Predict future values over time. Must respect time order \u2014 never random train/test splits.",
       models:"Naive forecast, Moving average, ARIMA/SARIMA, Prophet, XGBoost with time features, LSTM, Temporal transformers",
       metrics:"MAE, RMSE, MAPE, sMAPE, WAPE",
       examples:"Sales forecasting, demand planning, traffic prediction, energy usage"},
      {id:"recsys", title:"Recommendation Systems", color:"#0F6E56", bg:"#E1F5EE",
       desc:"Suggest relevant items to users (movies, products, songs, content)",
       models:"Collaborative filtering, Matrix factorization, Content-based, Two-tower models, Deep recommendation models",
       metrics:"Precision@K, Recall@K, MAP, NDCG, CTR, conversion rate",
       examples:"Netflix, Spotify, YouTube, Amazon product recommendations"},
      {id:"anomaly", title:"Anomaly Detection", color:"#993C1D", bg:"#FAECE7",
       desc:"Identify unusual behavior (fraud, intrusion, faulty sensors, unusual spending)",
       models:"Isolation forest, One-class SVM, Autoencoders, Statistical thresholding, Clustering-based",
       metrics:"Precision, Recall, F1, ROC-AUC, PR-AUC, alert quality in practice",
       examples:"Fraud detection, network intrusion, sensor monitoring"},
      {id:"nlp", title:"NLP Tasks", color:"#185FA5", bg:"#E6F1FB",
       desc:"Input is text: classification, NER, summarization, translation, QA, semantic search",
       models:"Traditional: LogReg+TF-IDF, Naive Bayes, SVM. Modern: BERT, RoBERTa, DeBERTa, T5, GPT, Sentence Transformers",
       metrics:"Accuracy, F1, Exact Match, BLEU, ROUGE, MRR",
       examples:"Sentiment analysis, document classification, NER, translation, search"},
      {id:"cv", title:"Computer Vision", color:"#534AB7", bg:"#EEEDFE",
       desc:"Input is image/video: classification, detection, segmentation, OCR, medical imaging",
       models:"CNNs, ResNet, EfficientNet, Vision Transformers, YOLO, Faster R-CNN, U-Net, SAM",
       metrics:"Accuracy, Precision, Recall, F1, IoU, mAP, Dice score",
       examples:"Image classification, object detection, segmentation, medical imaging"},
      {id:"genai", title:"Generative AI / Sequence Generation", color:"#854F0B", bg:"#FAEEDA",
       desc:"Model creates content: chat, summarization, code, translation, images. AI eng strongly overlaps with MLE here.",
       models:"GPT-style transformers, T5, Diffusion models, Multimodal foundation models",
       metrics:"ROUGE, BLEU, Exact Match, human eval, task success rate, hallucination rate, latency, cost",
       examples:"Chat assistants, code generation, image generation, summarization"}
    ];

    var TIERS = [
      {id:"t1", title:"Tier 1: Absolutely core (learn first)", color:"#185FA5", bg:"#E6F1FB", items:[
        {label:"Programming", detail:"Python, SQL, basic Bash. Software eng fundamentals: functions, classes, testing, APIs, Git, clean code."},
        {label:"ML Fundamentals", detail:"Supervised/unsupervised learning, train/val/test split, bias vs variance, overfitting/underfitting, feature engineering, cross-validation, hyperparameter tuning, data leakage, class imbalance."},
        {label:"Core Libraries", detail:"NumPy, pandas, scikit-learn, matplotlib, PyTorch (preferred default over TensorFlow in 2025)."},
        {label:"Deployment Basics", detail:"FastAPI or Flask, Docker, REST APIs, model serialization (pickle, ONNX), batch vs real-time inference."},
        {label:"Evaluation", detail:"Pick the right metric for the problem. Compare baseline vs advanced. Confusion matrix, threshold tuning, business tradeoffs."}
      ]},
      {id:"t2", title:"Tier 2: Very important for real jobs", color:"#0F6E56", bg:"#E1F5EE", items:[
        {label:"Data Handling", detail:"Cleaning, preprocessing, missing values, categorical encoding, scaling/normalization, feature pipelines."},
        {label:"Production / MLOps", detail:"MLflow or W&B, experiment tracking, model versioning, CI/CD basics, cloud basics (AWS/GCP/Azure). S3, EC2, Lambda, SageMaker."},
        {label:"Monitoring", detail:"Data drift, concept drift, latency, accuracy decay, failed predictions, retraining triggers."}
      ]},
      {id:"t3", title:"Tier 3: Learn later based on your path", color:"#854F0B", bg:"#FAEEDA", items:[
        {label:"Deep Learning", detail:"Neural networks, CNNs, RNNs, Transformers at an architectural level."},
        {label:"Specializations", detail:"NLP, computer vision, recommender systems, time series, ranking, reinforcement learning."},
        {label:"Distributed / Big Data", detail:"Spark, Ray, distributed PyTorch, feature stores, Kafka for real-time ML pipelines."}
      ]}
    ];

    var WORKFLOW_STEPS = [
      {n:1, title:"Define the business problem", detail:"'Can we predict churn?' 'Detect fraud?' 'Recommend products?' Usually driven by product/business/analytics.", who:"Product + DS"},
      {n:2, title:"Translate to ML problem", detail:"Churn \u2192 classification. Price \u2192 regression. Recommendations \u2192 ranking. Customer groups \u2192 clustering. Summarize docs \u2192 generation.", who:"DS + MLE"},
      {n:3, title:"Define success", detail:"Not just model performance but product success: increase retention 5%, reduce fraud losses, latency < 100ms.", who:"Product + DS"},
      {n:4, title:"Gather and prepare data", detail:"Identify sources, clean, label if needed, define features, split train/val/test, check for leakage.", who:"DE + DS"},
      {n:5, title:"Build a baseline", detail:"LogReg for classification, LinReg for regression, naive forecast for time series. Shows if complex ML is even needed.", who:"DS + MLE"},
      {n:6, title:"Experiment with candidates", detail:"Try multiple models, features, hyperparameters. Both DS and MLE may do this depending on team.", who:"DS + MLE"},
      {n:7, title:"Evaluate correctly", detail:"Right metric, compare to baseline, error analysis, subgroup performance, robustness checks.", who:"DS + MLE"},
      {n:8, title:"Productionize", detail:"Package model, create train/inference pipelines, expose endpoint, add logging/monitoring, deploy safely.", who:"MLE leads"},
      {n:9, title:"Monitor in production", detail:"Latency, failures, drift, real-world performance, retraining needs.", who:"MLE + DE"},
      {n:10, title:"Iterate", detail:"Production teaches you what notebooks missed. Continuous improvement loop.", who:"Everyone"}
    ];

    function Chevron(props) {
      return e("svg", {width:18, height:18, viewBox:"0 0 20 20", fill:"none",
        style:{transition:"transform 0.3s", transform:props.open?"rotate(180deg)":"rotate(0)", flexShrink:0}},
        e("path", {d:"M5 7.5L10 12.5L15 7.5", stroke:"currentColor", strokeWidth:2, strokeLinecap:"round", strokeLinejoin:"round"})
      );
    }

    function Accordion(props) {
      var _s = useState(false), open = _s[0], setOpen = _s[1];
      return e("div", {style:{marginBottom:6, borderRadius:10, border:open?"1.5px solid "+(props.color||"#ddd"):"1px solid #e8e8e8",
        background:open?(props.bg||"#f9f9f9")+"66":"#fff", overflow:"hidden", transition:"all 0.2s"}},
        e("button", {onClick:function(){setOpen(!open)}, style:{width:"100%", display:"flex", alignItems:"center", gap:10,
          padding:"12px 16px", background:"transparent", border:"none", cursor:"pointer", textAlign:"left", color:"#1a1a2e"}},
          props.badge ? e("span", {style:{fontSize:10, fontWeight:600, color:props.color, background:props.bg,
            padding:"2px 8px", borderRadius:6, whiteSpace:"nowrap"}}, props.badge) : null,
          e("span", {style:{flex:1, fontSize:14, fontWeight:500, lineHeight:1.4}}, props.title),
          e(Chevron, {open:open})
        ),
        open ? e("div", {style:{padding:"0 16px 14px", animation:"fadeIn 0.25s ease"}}, props.children) : null
      );
    }

    function RoleCard(props) {
      var r = props.role;
      return e("div", {style:{background:r.bg, border:"1px solid "+r.color+"44", borderRadius:12, padding:"16px 20px", flex:"1 1 200px", minWidth:200}},
        e("div", {style:{display:"flex", alignItems:"center", gap:8, marginBottom:8}},
          e("span", {style:{fontWeight:700, fontSize:20, color:r.color}}, r.abbr),
          e("span", {style:{fontSize:13, fontWeight:600, color:r.color}}, r.title)
        ),
        e("div", {style:{fontSize:13, fontStyle:"italic", color:r.color+"CC", marginBottom:10, lineHeight:1.5}}, '"'+r.oneLiner+'"'),
        e("div", {style:{fontSize:11, color:"#888", marginBottom:8}}, "Think of: "+r.thinkOf),
        r.responsibilities.map(function(item, i) {
          return e("div", {key:i, style:{fontSize:12, color:"#444", padding:"3px 0", paddingLeft:12, borderLeft:"2px solid "+r.color+"33", marginBottom:3, lineHeight:1.5}}, item);
        })
      );
    }

    function ProblemCard(props) {
      var p = props.problem;
      return e(Accordion, {title:p.title, color:p.color, bg:p.bg, badge:p.id.toUpperCase()},
        e("div", {style:{fontSize:13, lineHeight:1.7, color:"#333"}},
          e("div", {style:{marginBottom:8}}, e("span", {style:{fontWeight:500, color:p.color}}, "What: "), p.desc),
          e("div", {style:{marginBottom:8}}, e("span", {style:{fontWeight:500, color:p.color}}, "Models: "), p.models),
          e("div", {style:{marginBottom:8}}, e("span", {style:{fontWeight:500, color:p.color}}, "Metrics: "), p.metrics),
          e("div", null, e("span", {style:{fontWeight:500, color:p.color}}, "Examples: "), p.examples)
        )
      );
    }

    function HandbookApp() {
      var _sec = useState("roles"), section = _sec[0], setSection = _sec[1];

      var sections = [
        {id:"roles", label:"Roles & Overlaps"},
        {id:"problems", label:"Problem Categories"},
        {id:"workflow", label:"ML Workflow"},
        {id:"learning", label:"Learning Path"},
        {id:"tools", label:"Tool Stack"},
        {id:"metrics", label:"Metrics Cheat Sheet"}
      ];

      return e("div", {style:{maxWidth:900, margin:"0 auto", padding:"8px 0"}},
        e("style", null, "@keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }"),

        e("h2", {style:{fontSize:22, fontWeight:600, margin:"0 0 4px"}}, "ML Engineer Handbook"),
        e("p", {style:{fontSize:13, color:"#888", margin:"0 0 16px"}},
          "Roles, problem types, workflows, learning paths, and tool stacks \u2014 the practical guide to ML careers"
        ),

        e("div", {style:{display:"flex", gap:6, flexWrap:"wrap", marginBottom:20, borderBottom:"1px solid #eee", paddingBottom:12}},
          sections.map(function(s) {
            var active = section === s.id;
            return e("button", {key:s.id, onClick:function(){setSection(s.id)}, style:{
              padding:"7px 16px", borderRadius:8, fontSize:13, fontWeight:active?600:400, cursor:"pointer",
              border:active?"none":"1px solid #ddd",
              background:active?"#1a1a2e":"transparent",
              color:active?"#fff":"#666", transition:"all 0.2s"
            }}, s.label);
          })
        ),

        section === "roles" ? e("div", null,
          e("h3", {style:{fontSize:16, fontWeight:600, marginBottom:12}}, "The four roles"),
          e("div", {style:{display:"flex", gap:12, flexWrap:"wrap", marginBottom:24}},
            ROLES.map(function(r) { return e(RoleCard, {key:r.id, role:r}); })
          ),
          e("h3", {style:{fontSize:16, fontWeight:600, marginBottom:12}}, "Where they overlap"),
          OVERLAPS.map(function(o, i) {
            return e("div", {key:i, style:{marginBottom:10, padding:"12px 16px", borderRadius:10, background:o.color+"0A", border:"1px solid "+o.color+"22"}},
              e("div", {style:{fontSize:13, fontWeight:600, color:o.color, marginBottom:6}}, o.a+" \u2229 "+o.b),
              e("div", {style:{display:"flex", flexWrap:"wrap", gap:6}},
                o.items.map(function(item, j) {
                  return e("span", {key:j, style:{fontSize:11, padding:"3px 10px", borderRadius:6, background:o.color+"15", color:o.color}}, item);
                })
              )
            );
          }),
          e("div", {style:{marginTop:16, padding:"14px 18px", background:"#f5f5f0", borderRadius:10, fontSize:13, lineHeight:1.7, color:"#555"}},
            e("span", {style:{fontWeight:600, color:"#333"}}, "Who decides the model? "),
            "It\u2019s collaborative. The DS tests hypotheses and picks promising models experimentally. The MLE decides what\u2019s practical to deploy (speed, cost, maintainability). Product stakeholders influence which metric matters, acceptable latency, and whether interpretability is needed. In mature teams, model choice is shared."
          ),
          e("div", {style:{marginTop:10, padding:"14px 18px", background:"#f5f5f0", borderRadius:10, fontSize:13, lineHeight:1.7, color:"#555"}},
            e("span", {style:{fontWeight:600, color:"#333"}}, "The most important mindset shift: "),
            "A strong MLE is NOT the person who knows every model. It\u2019s the person who can frame the problem correctly, choose a reasonable baseline, evaluate honestly, build reliable pipelines, deploy safely, monitor production, and improve over time."
          )
        ) : null,

        section === "problems" ? e("div", null,
          e("h3", {style:{fontSize:16, fontWeight:600, marginBottom:4}}, "ML problem categories"),
          e("p", {style:{fontSize:13, color:"#888", marginBottom:12}}, "Each category has its own models, metrics, and evaluation approach. Click to expand."),
          PROBLEM_CATEGORIES.map(function(p) { return e(ProblemCard, {key:p.id, problem:p}); }),
          e("div", {style:{marginTop:16, padding:"14px 18px", background:"#E6F1FB", borderRadius:10, fontSize:13, lineHeight:1.7, color:"#042C53"}},
            e("span", {style:{fontWeight:600}}, "Where do Transformers fit? "),
            "Transformers are NOT a problem category \u2014 they\u2019re a model family. They\u2019re used in NLP, computer vision, speech, multimodal AI, ranking, and time series. Classification, regression, and ranking are problem types. Transformers can solve several of those problem types."
          )
        ) : null,

        section === "workflow" ? e("div", null,
          e("h3", {style:{fontSize:16, fontWeight:600, marginBottom:12}}, "The ML workflow playbook"),
          WORKFLOW_STEPS.map(function(step) {
            return e("div", {key:step.n, style:{display:"flex", gap:14, marginBottom:10, alignItems:"flex-start"}},
              e("div", {style:{width:32, height:32, borderRadius:"50%", background:"#1a1a2e", color:"#fff",
                display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:600, flexShrink:0}}, step.n),
              e("div", {style:{flex:1, padding:"6px 14px", background:"#fff", borderRadius:10, border:"1px solid #eee"}},
                e("div", {style:{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4}},
                  e("span", {style:{fontSize:14, fontWeight:600, color:"#1a1a2e"}}, step.title),
                  e("span", {style:{fontSize:10, padding:"2px 8px", borderRadius:6, background:"#EEEDFE", color:"#534AB7"}}, step.who)
                ),
                e("div", {style:{fontSize:13, color:"#555", lineHeight:1.5}}, step.detail)
              )
            );
          }),
          e("div", {style:{marginTop:16, padding:"14px 18px", background:"#FAEEDA", borderRadius:10, fontSize:13, lineHeight:1.7, color:"#412402"}},
            e("span", {style:{fontWeight:600}}, "Key principle: "),
            "Always build a baseline BEFORE fancy models. Logistic regression for classification, linear regression for regression, naive forecast for time series. This tells you whether complex ML is even necessary."
          )
        ) : null,

        section === "learning" ? e("div", null,
          e("h3", {style:{fontSize:16, fontWeight:600, marginBottom:12}}, "MLE learning path (in order)"),
          TIERS.map(function(tier) {
            return e("div", {key:tier.id, style:{marginBottom:16}},
              e("div", {style:{fontSize:14, fontWeight:600, color:tier.color, marginBottom:8, padding:"6px 12px",
                background:tier.bg, borderRadius:8, display:"inline-block"}}, tier.title),
              tier.items.map(function(item, i) {
                return e(Accordion, {key:i, title:item.label, color:tier.color, bg:tier.bg},
                  e("div", {style:{fontSize:13, lineHeight:1.7, color:"#444"}}, item.detail)
                );
              })
            );
          }),
          e("div", {style:{marginTop:16, padding:"14px 18px", background:"#FAECE7", borderRadius:10, fontSize:13, lineHeight:1.7, color:"#4A1B0C"}},
            e("span", {style:{fontWeight:600}}, "What to deprioritize early: "),
            "Building transformers from scratch, advanced math proofs, Kubernetes deep expertise, distributed training, every cloud service, every DL architecture. Your early goal: understand ML problem types, build solid models, evaluate correctly, deploy simple versions, understand what breaks in production."
          )
        ) : null,

        section === "tools" ? e("div", null,
          e("h3", {style:{fontSize:16, fontWeight:600, marginBottom:12}}, "MLE tool stack"),
          e("div", {style:{display:"grid", gridTemplateColumns:"repeat(auto-fit, minmax(260px, 1fr))", gap:12}},
            [
              {title:"Core Stack", color:"#185FA5", bg:"#E6F1FB",
               items:["Python","SQL","scikit-learn","PyTorch","pandas / NumPy","matplotlib","Jupyter","Git"]},
              {title:"Production Stack", color:"#0F6E56", bg:"#E1F5EE",
               items:["FastAPI or Flask","Docker","MLflow or W&B","PostgreSQL","Redis (sometimes)","S3 / cloud storage","CI/CD basics"]},
              {title:"Nice-to-Have", color:"#854F0B", bg:"#FAEEDA",
               items:["Airflow","Spark","Kafka","Kubernetes","Ray","Feature stores","Vector databases (RAG/retrieval)"]}
            ].map(function(stack) {
              return e("div", {key:stack.title, style:{background:stack.bg, border:"1px solid "+stack.color+"33", borderRadius:12, padding:"14px 18px"}},
                e("div", {style:{fontSize:14, fontWeight:600, color:stack.color, marginBottom:10}}, stack.title),
                stack.items.map(function(item, i) {
                  return e("div", {key:i, style:{fontSize:13, color:"#444", padding:"4px 0 4px 12px", borderLeft:"2px solid "+stack.color+"33", marginBottom:3}}, item);
                })
              );
            })
          ),
          e("div", {style:{marginTop:16}},
            e("h4", {style:{fontSize:14, fontWeight:600, marginBottom:8}}, "AWS services for MLE"),
            e("div", {style:{display:"flex", flexWrap:"wrap", gap:8}},
              ["S3 (storage)","EC2 (compute)","Lambda (serverless)","ECR (containers)","SageMaker (ML platform)","IAM (security)"].map(function(s, i) {
                return e("span", {key:i, style:{fontSize:12, padding:"5px 12px", borderRadius:8, background:"#E6F1FB", color:"#185FA5", border:"1px solid #185FA533"}}, s);
              })
            )
          )
        ) : null,

        // ═══════════════════════════════════════════════════
        // METRICS CHEAT SHEET SUB-TAB
        // ═══════════════════════════════════════════════════
        section === "metrics" ? e("div", null,
          e("h3", {style:{fontSize:16, fontWeight:600, marginBottom:4}}, "Metrics cheat sheet"),
          e("p", {style:{fontSize:13, color:"#888", marginBottom:16}}, "Problem \u2192 Metric \u2192 Threshold \u2192 Real-world use case \u2192 Decision rule. Click any category to expand."),

          // ── CLASSIFICATION ──
          e(Accordion, {title:"Classification metrics", color:"#185FA5", bg:"#E6F1FB", badge:"CLASS"},
            e("div", {style:{fontSize:13, lineHeight:1.7, color:"#333"}},
              e("div", {style:{marginBottom:14}},
                e("div", {style:{fontWeight:600, color:"#185FA5", marginBottom:6}}, "Accuracy"),
