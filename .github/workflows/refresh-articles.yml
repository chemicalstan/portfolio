name: Refresh articles

on:
  push:
    branches: [main]
    paths-ignore:
      - articles.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch Medium articles
        run: node .github/scripts/fetch-articles.mjs

      - name: Commit if changed
        run: |
          if ! git diff --quiet articles.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add articles.json
            git commit -m "refresh articles"
            git push
          else
            echo "articles.json unchanged"
          fi
